architecture:
  allure_report:
    unified_displays:
      - text: 自動ゲート結果はG1〜G5およびPromptfooの結果を一覧で表示し、各ゲートの判定とスコアとエビデンス参照を表示する。
      - text: G2は人のチェックリスト結果でDoneまたはAbortの判断を表示し、チェック項目ごとのスコアを集計して反映する。
      - text: G2のAbortは理由を必須とし、Doneは理由不要とする。
      - text: G2の証跡リンクは必要な場合に付けられるようにする。
      - text: 重み付き合算スコアはG1〜G5とPromptfooの各スコアをウェイト定義（9.3節）に基づいて合算した総合指標である。
      - text: 各ゲートの内訳とスコア分布はゲート別および評価軸別に確認できるようにする。
      - text: スコア推移はDeep EvalとPromptfooの推移を追跡し、モデル変動や改修前後の品質変化を可視化する。
      - text: Abort分析はカテゴリ分布と理由品質を集計し、判断回避の常態化を検知する。
      - text: Traceability Matrixは要件から設計とテストへの紐付けを表示する。
