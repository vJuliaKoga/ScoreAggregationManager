rationale: ツール仕様書のブラッシュアップに伴い、認証・ロール設計、UI機能の詳細方針、リスクレベル管理、カスタム項目追加機能、ノード出現制御、JSONエクスポート仕様を企画段階の方針として追加。
changes: 認証・ロール設計の基本方針（21.5）、UI機能の基本方針（21.6）を追加。Phase 2に認証・管理機能を含めるよう拡充。引継ぎ観点を詳細化。
ssot_note: null
artifact_kind: architecture
primary_section: 21. CheckFlow 詳細設計
goal: null
problem: null
scope: null
constraints: null
architecture:
  purpose:
    ui_goal: CheckFlowはNotebookLMのような動的展開型マインドマップUIを活用した品質ゲート基盤である。
    achieves:
    - 工程ごとの品質チェック
    - 承認ログ記録
    - 証跡出力
    - フェーズ別テンプレート量産
    future_direction:
    - 社内利用に留まらず、将来的なパッケージ販売・商用展開を視野
  core_concept:
    concept_name: テンプレート駆動型アプリケーション
    fixed:
    - UIやロジックは固定
    - CheckFlowのコンセプトはテンプレート駆動型アプリケーションであり単一エンジンで複数フェーズを生成する。
    parameterized_elements:
    - テキスト / input / button
    - 表示・非表示制御
    - ツリー構造（ノード型UI）
    - フェーズ内容
    external_definitions:
    - 外部定義ファイル（JSON/YAML）とマージ
    - テンプレ差し替えで企画・要件定義・基本設計等のチェックリストアプリを量産
  supported_phases:
  - phase: 企画
    content: 企画段階のQA観点・スコープ・成功条件確認
  - phase: 要件定義
    content: 要件妥当性・曖昧語・トレーサビリティ確認
  - phase: 基本設計
    content: 構造整合・インタフェース定義確認
  - phase: 詳細設計
    content: 詳細仕様・スキーマ準拠確認
  - phase: 実装
    content: コードレビュー観点・実装チェック
  - phase: 運用
    content: 運用保守・障害対応観点確認
  pwa_policy:
    adoption: PWA（Progressive Web App）
    expected_effects:
    - ブラウザベース開発（追加インストール不要）
    - インストール可能なアプリ形態（デスクトップアイコン対応）
    - オフライン利用対応（サービスワーカー活用）
    - PCアプリに近いUX
    - サーバー非依存構成（Phase 1はローカル完結）
    positioning:
    - サーバーコストを抑えつつ、将来的なSaaS化も可能な中間構造
  authentication_role_policy:
    role_definitions:
    - role: User
      responsibilities: チェックリストの実行・状態更新・JSONエクスポート
      introduction_phase: Phase 1〜
    - role: Admin
      responsibilities: User権限 + 全ユーザーログ閲覧・ユーザー/ロール管理・管理者追加
      introduction_phase: Phase 2〜
    phased_authentication:
    - phase: Phase 1（MVP）
      method: 認証なし（任意）
      characteristics: 確認者名を自己申告入力、ローカル完結
    - phase: Phase 2（証跡強化）
      method: ID/Password認証
      characteristics: ロール別アクセス制御、管理者ダッシュボード導入
    - phase: Phase 3（商用化）
      method: 高度な認証（SSO等）
      characteristics: 組織階層対応、監査対応レベルの認証
    admin_features_overview:
      available_from: Phase 2以降
      key_functions:
      - name: ユーザー管理
        detail: 新規ユーザー作成、初期パスワード発行、ロール指定
      - name: ロール管理
        detail: 既存ユーザーの権限変更（User ⇔ Admin）
      - name: ログ閲覧
        detail: 全ユーザーの承認履歴を検索・フィルタ・エクスポート可能
    design_note: 詳細な権限境界・UI設計は基本設計フェーズで確定する
  ui_features_policy:
    node_appearance_control:
    - 初期状態では最初のチェックリスト項目（ノード）のみ表示
    - 前のノードがDoneまたはPendingになると、動的に矢印が伸びて次ノードが1つずつ出現
    - NotebookLM風の段階的展開により、進行状況を視覚的に把握可能
    side_panel_details:
      trigger: ノードクリック時に画面右側に展開
      input_items:
      - name: 実施者名
        required: true
      - name: 詳細チェック項目
        type: チェックボックスリスト
        source: テンプレートで定義
      display_items:
      - 説明文・検証方法・合格基準
      - PASS/FAIL/ABORT例（判断の参考情報）
      selection_items:
      - name: リスクレベル
        options:
        - S
        - A
        - B
        - C
        default: テンプレートでデフォルト値設定可能
      - name: ステータス
        options:
        - ToDo
        - InProgress
        - Pending
        - Done
      - name: Pending理由
        condition: Pending選択時のみ表示
        required: true
    custom_item_addition:
    - すべての定義済みチェックリスト項目が完了した時点で＋ボタンを表示
    - ユーザーが独自のチェック項目を最大5件まで追加可能
    - カスタム項目も既存ノードと同じUI・操作で扱える
    - プロジェクト固有の確認事項に柔軟に対応
    json_export_spec:
      placement: フェーズ画面の左上に常時固定表示
      output_condition: 任意時点で出力可能（InProgress状態でも可）
      use_cases:
      - CI連携テスト用の途中状態確認
      - レビュー・監査時の証跡提出
      output_contents:
      - 現在状態のスナップショット
      - ログ履歴
      - テンプレートID/バージョン
      design_note: 詳細なJSON構造・スキーマは詳細設計フェーズで確定する
  tech_stack_direction:
    note: 基本設計フェーズで詳細を確定する
    candidates:
    - area: フロントエンド
      choice: Next.js + TypeScript + React
      notes:
      - PWA設定（manifest / Service Worker）
    - area: バックエンド（Phase 1）
      choice: なし（ローカル完結）
      notes:
      - localStorage / IndexedDB
    - area: バックエンド（将来）
      choice: 認証API / ログ保存API / DB連携
      notes:
      - フェーズ3以降で追加
  development_phase_plan:
  - phase: Phase 1
    name: MVP（動作確認版）
    purpose: 基盤エンジンの確立
    items:
    - '構成: Next.js + PWA + ローカル保存（localStorage / IndexedDB）'
    - '出力: JSONエクスポート / ログ出力機能'
    - '特徴: サーバーコストゼロ・単体利用可能・品質ゲートUI完成'
    - '方針: 『まず動くもの』を構築し、内部での視座共有を実現'
  - phase: Phase 2
    name: 証跡強化版
    purpose: 品質保証レベルの向上 + 認証・管理機能の導入
    items:
    - 認証機能（ID/Password認証、ロール別アクセス制御）
    - 管理者ダッシュボード（ユーザー管理、ロール管理、全ユーザーログ閲覧）
    - ユーザー名入力必須（承認者情報を全ログに付与）
    - ログ署名ハッシュ生成（JSONエクスポート時に改ざん検知）
    effects:
    - 改ざん検知可能なログ構造
    - 承認責任の明確化
    - 組織内での役割分担が可能
    notes:
    - ローカル時刻を使用
    - ハッシュ生成アルゴリズムの詳細は詳細設計フェーズで定義
  - phase: Phase 3
    name: 商用化対応
    purpose: パッケージ販売・外部展開
    items:
    - 高度な認証（SSO等の企業向け認証方式）
    - サーバー保存（承認履歴のDB管理）
    - サーバー時刻取得（ローカル時刻改ざんリスクを排除）
    - 電子署名（本人性の証明、監査対応）
    - 組織階層対応（部門・チーム単位のアクセス制御）
    effects:
    - 監査対応レベルの証跡
    - チーム共有
    - クラウド型提供が可能
    notes:
    - 認証方式・DB設計の詳細は要件定義〜設計フェーズで定義
  evidence_levels:
  - level: Lv1
    storage: ローカル保存（IndexedDB）
    strength: 低
    phase: Phase 1（MVP）
    notes:
    - フォーマット仕様は詳細設計フェーズで定義
  - level: Lv2
    storage: 署名付きJSON（ハッシュ検証）
    strength: 中
    phase: Phase 2（証跡強化）
    notes:
    - ハッシュ計算方法は詳細設計フェーズで定義
  - level: Lv3
    storage: サーバー保存 + サーバー時刻
    strength: 高
    phase: Phase 3（商用化）
  parallel_development_dependency:
    with: Gate Runner（Dockerfile自動生成基盤）
    reasons:
    - G2工程でCheckFlowが生成するchecklistresults.jsonはGate Runnerの入力として必須である。
    - CheckFlowの出力JSONをGate Runnerが消費・検証する構造であるため、データフォーマットの早期確定が両プロジェクトに影響する。
    - CheckFlowの出力JSONをRunnerが消費・検証する構造のため、データフォーマットの早期確定が両プロジェクトに影響する。
    required_actions:
    - JSON定義仕様の早期確定（企画完了後、要件定義フェーズ冒頭で実施）
    - 両プロジェクト間のデータフォーマット整合確認
    priority_note:
    - checklistresults.json スキーマの確定は要件定義フェーズで最優先
  business_model_options:
  - model: 社内展開
    overview: 既存チームへの段階導入（Phase 1〜2で実現）
  - model: パッケージ販売
    overview: フェーズ別テンプレートとエンジンのセット販売
  - model: SaaS展開
    overview: クラウド型提供（Phase 3以降）
  - model: 人月型ビジネス
    overview: 導入支援・テンプレートカスタマイズ
  risks_and_countermeasures:
  - risk: ローカル改ざん
    countermeasure: Phase 2以降で署名ハッシュを導入
    phase: Phase 2
  - risk: 証跡強度不足（監査対応）
    countermeasure: 商用版でサーバー時刻採用
    phase: Phase 3
  - risk: 開発肥大化
    countermeasure: 段階的フェーズ開発で管理
    phase: 全フェーズ
  - risk: JSON仕様の不整合
    countermeasure: Gate Runnerとの早期仕様合意
    phase: 要件定義
  handover_points:
    to_requirements_phase:
    - 'ロール設計の詳細: Admin（全機能 + ユーザー管理）/ User（チェック実行のみ）の権限境界'
    - '認証要件: Phase 2向けID/Password認証の詳細仕様、Phase 3向けSSO等の選定'
    - 'ステータス種別と遷移ルール: ToDo / InProgress / Pending / Done（Pending時の理由必須など）'
    - 'リスクレベル定義: S / A / B / C の評価基準、デフォルト値設定ルール'
    - 'JSONエクスポート仕様: 出力条件・CI連携時のFail判定（未完了項目あり = FAIL）'
    - 'カスタム項目追加機能: 最大5件の制限根拠、入力可能項目の詳細仕様'
    - 'checklistresults.json スキーマ確定: Runnerとのインタフェースとして最優先で合意'
    to_basic_design_phase:
    - '画面遷移設計: ログイン → Top → フェーズ画面 → チェックリスト → サイドパネル展開'
    - 状態遷移設計（ノード単位の遷移と次ノード解放、1つずつ出現）
    - UIコンポーネント構成（ツリー構造ノード / サイドパネル / 固定ヘッダ / 詳細チェック項目 / リスクレベル・ステータスドロップダウン
      / カスタム項目追加の＋ボタンとモーダル）
    - 管理者ダッシュボード設計（ユーザー一覧・ロール変更・承認履歴閲覧）
    - アニメーション仕様（ノード間の線描画・次ノード出現演出、動的に伸びる矢印）
    to_detail_design_phase:
    - 'JSONデータ構造設計: チェックリスト定義ファイル（テンプレートYAML/JSON）のスキーマ / 詳細チェック項目（detailedChecks）の配列構造
      / リスクレベル（riskLevel）のデフォルト値と選択肢 / カスタム項目（isCustomフラグ）の識別方法'
    - 'ログフォーマット仕様: checkedby / timestamp / status / reason / riskLevel / evidence_refs
      の型定義'
    - '署名ハッシュ生成アルゴリズム（Phase 2）: 入力値・アルゴリズム選定・検証方法'
    - 'バックエンド拡張設計（Phase 3）: 認証API / ログ保存API / DB設計'
    - オフライン同期設計（Service WorkerキャッシュとオンラインDB同期の整合）
