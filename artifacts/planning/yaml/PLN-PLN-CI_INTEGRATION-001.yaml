integration:
  components:
  - name: CI（Gate Runner / Docker）
    responsibilities:
    - 自動評価を実行
    - 各ゲート・各評価軸のスコアを機械可読な成果物として出力（再現可能・比較可能）
  - name: ワークフローツール（最終工程）
    responsibilities:
    - チェックリスト（Coach相当）の入力・承認
    - CI成果物をアップロードして最終サマリを1枚に集約
  - name: 証跡ハブ（Allure）
    responsibilities:
    - 自動ゲート結果＋人の判断ログ（理由・証跡リンク）＋サマリを統合して保管
  recommended_flow:
  - step: 1
    action: CIで Gate Runner を実行（G1/G3/G4/G5/PF など）
    outputs:
    - output/*.json（ゲート別JSON）
    - allure-results/（Allure用）
    - 付随証跡（差分/リンク/ログ）
  - step: 2
    action: ワークフローツール最終工程ではCI成果物のzip等アップロードを必須にする。
  - step: 3
    action: 同工程でCoach相当のチェックリスト入力を確定し合計点を算出する。
  - step: 4
    action: 集約（軽量）で合計点/分布/判定を生成し、Allureに統合
    generates:
    - 合計点（自動＋チェックリスト）
    - スコア分布（軸別/ゲート別）
    - 判定（最終は人のDone/Abortを主、自動はWarn/Info中心）
    - 判定結果はpassとwarnとfailの三値で出力しAllureへ統合する。
  minimum_artifact_spec:
    ci_gate_json:
      required_fields:
      - gate_id
      - axis_scores
      - score_total
      - pass|warn|fail
      - evidence
    checklistresults_json_equivalent:
      required_fields:
      - item_id
      - risk_level
      - selection
      - score
      - reason
      - evidence_refs
  checklist_scoring_ui_idea:
  - チェック項目はリスクレベル（High/Med/Low）を持たせ、重み付けできるようにする
  - 入力は上下選択ボックス（例：OK / Concern / NG）を基本にして採点負荷を下げる
  - Concern/NG は原則 理由必須（証跡リンク/該当箇所参照を推奨）
  judgment_policy:
  - スコアは合否の唯一根拠にしない（最終判断は人のDone/Abort）
  - 人の判断ログではAbortの理由を必須とし、Doneは理由不要とする。
  - 自動ゲート結果と人の判断ログと最終サマリを統合して保管する。
  - 0.70未満は必ずWarningを出す
  - ブロック（Fail）条件は重大ゲート（例：スキーマ逸脱、必須情報欠落等）に限定し、段階的に導入
