id_issuer:
  utility:
    name: issueid.py
    functions:
    - issueid.pyはIDレジストリから指定キーの次IDを発行しnextnnnを更新する。
    - issueid.pyはレジストリのnextnnn更新とstdoutへ発行ID出力を同時に実施する。
    - 発行結果はidissuedlog.yamlへ追記し同時にstdoutへ出力して他ツール連携に利用する。
    - 発行IDは他ツール連携を前提にidissuedlog.yamlへ追記して追跡可能にする。
  operation_assumption:
  - 現状はsingle-user前提（ロックなし）での運用を想定する。
  - チーム同時利用が増えた段階でロック/集中管理へ拡張
