rationale: >-
  付録AのIDを運用仕様へ昇格し、要約ではなく実行可能な判定・例外・証跡設計まで定義する。
changes:
  - 入力→処理→出力を明示
  - 判定基準（70/90、0.70、0.60、曖昧語10件超）を明示
  - referenced_internal_ids / traceability.links を必須化
ssot_note: Coach UI / Gate Runner / Allure の表記を全ファイルで統一する。
artifact_kind: design
primary_section: "20 CI品質保証（Docker）とワークフローツールの接続（実装方針）"

design:
  rationale: >-
    実装者間の解釈差を抑えるため、入力→処理→出力を共通設計として固定する。
  items:
    - input: 成果物YAML/Markdownとchecklistresults.json。
    - process: G1→G3→G4→G5→G2→PFの順で評価。
    - process: G3未通過時はG4をスキップ。
    - output: output/*.jsonとallure-results/を生成。

eval:
  rationale: >-
    合否の恣意性を防ぐため、閾値と条件分岐を全IDで共通化する。
  items:
    - LOW Riskは70点以上、HIGH Riskは90点以上を目安。
    - 総合スコア0.70未満はWarning。
    - Faithfulness 0.60未満はFail。
    - 曖昧語10件超はFail。

risks:
  rationale: >-
    運用停止を避けるため、例外時の継続条件と復旧条件を事前定義する。
  items:
    - G4 API障害はWarning扱いで他ゲート継続。
    - 0.65〜0.75は境界帯Warningとして再レビュー。
    - planned_linkはWarning管理して後続で正式化。
    - 修正前後ログをAllureで比較可能に保全。

operations:
  rationale: >-
    日次運用で迷わないよう、手順と責任分担を固定する。
  items:
    - 担当者はCoach UIでDone/Abortと理由を記録。
    - Gate Runnerは同一入力で再現可能実行。
    - Allureは単一の証跡ハブとして運用。
    - Warning案件は次回レビューで再評価。

