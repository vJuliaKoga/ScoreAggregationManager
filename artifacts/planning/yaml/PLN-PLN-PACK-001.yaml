workflow:
  pack_strategy:
    principle: 本体（フレーム）は共通、工程ごとの『チェックリスト/スキーマ/プロンプト/テンプレ』をパックとして提供
    descriptions:
    - PLNパック（企画）は企画を機械可読にし、企画段階のQA観点を標準装備する。
    - BASおよびDETパックは設計工程の品質観点を拡張し設計崩壊を予防する。
    - PLNパックは企画を機械可読化し企画段階のQA観点を標準で適用する。
    - REQパックは要件妥当性チェックをhumanレビューとDeep Evalの両方で実施する。
    - 各工程パックはチェックリストとスキーマとプロンプトとテンプレートを含み後工程の自動化と検証に接続する。
    - BASとDETパックは構造整合観点を拡張し後工程の設計崩壊を予防する。
    packs:
    - pack: PLN（企画）
      contents:
      - 企画を機械可読にする
      - 企画段階のQA観点を入れる
    - pack: REQ（要件）
      contents:
      - 要件妥当性チェック（human+Deep Eval）
      - スキーマ
      - 曖昧語
      - トレース
    - pack: BAS/DET
      contents:
      - 設計工程の拡張
    - pack: 実装/運用
      contents:
      - 将来拡張
