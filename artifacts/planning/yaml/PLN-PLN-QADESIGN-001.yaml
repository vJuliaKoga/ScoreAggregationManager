inspection_design:
  planning_required_viewpoints:
  - viewpoint: 検証可能性
    check: 成功条件/KPIが測定可能で、テスト可能な言葉か
  - viewpoint: スコープ
    check: スコープ内/外、Abort条件が事前に定義されているか
  - viewpoint: リスク/運用
    check: 運用保守・証跡・権限の考慮があるか（最低限の宣言）
  traceability_policy:
  - 企画内の主張（Goal/Prob/Scope/Cons等）にPLN-IDを付与
  - 要件側の derivedfrom へ接続する方針
  - 『企画→要件へトレース可能』を自動検証できるようにする
  gates:
    principle: 構造の逸脱を最大リスクとして設計
    table:
    - gate: G1
      content: 曖昧語チェック + 内容lint
      input: .yaml / .md
      output: ambiguityreport.json
      tool: 曖昧語検出ツール
    - gate: G2
      content: Checklist完了検証（Coach判断ログ）
      input: checklist.json
      output: checklistvalidation.json
      tool: チェックリストツール
    - gate: G3
      content: Schema検証 + 構造lint
      input: '*.yaml'
      output: schemareport.json
      tool: 構造解析ライブラリ
    - gate: G4
      content: Deep Evalスコアリング
      input: prompts/, requirements/
      output: deepevalscores.json
      tool: DeepEval
    - gate: G5
      content: トレーサビリティ（全ID参照）
      input: 全ID参照マトリクス
      output: tracematrix.json
      tool: 整合性検証ツール
    - gate: PF
      content: Promptfoo評価
      input: prompts/, configs/
      output: promptfooresults.json
      tool: Promptfoo
  gate_role_summary:
  - gate: G1
    role: 要件定義の『揺れ』を初期段階で摘み取り、後工程の解釈不一致による手戻りを防ぐ
  - gate: G2
    role: G2 (Checklist Validation)：文脈に応じた「人間による高度な判断」を構造化データとしてCIに接続する。
  - gate: G3
    role: G3 (Schema/Structure)：設計の整合性を強制し、将来的な改修コスト増大（技術的負債の罠）を阻止する。
  - gate: G4
    role: 生成物の整合性（Faithfulness等）を定量化し、出力品質の客観的指標とする
  - gate: G5
    role: G5 (Traceability)：要件IDと実装の紐付けを検証。要求のない実装（孤立した定義）や実装漏れを機械的に特定する。
  - gate: PF
    role: プロンプト変更時の性能退行（リグレッション）を数値化し、出力の安定性を担保する
  aggregation_note:
  - 全ゲート結果はCI/CD上で単一の『統合報告書（JSON）』として集約される
