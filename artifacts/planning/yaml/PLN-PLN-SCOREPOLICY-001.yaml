score_policy:
  policy:
  - スコアは合否の唯一根拠にしない（最終判断は人＝CoachのDone/Abort）
  - 0.70未満はWarningを必ず出す
  - Allure上でWarningとして表示
  - Warningに『理由要約／改善ガイド／再実行条件』をセットで出す
  - '0.70は pass_threshold: 0.7 を社内標準の警告ラインとして採用'
  - 'Deep Eval：品質の"定量指標"。モデル変動を前提に、スコア推移を記録し劣化を検知する（Allureに推移も集約）。'
  - Promptfoo：プロンプト品質の回帰テストとして位置づけ、テンプレ改善サイクルの根拠にする。
  weights:
  - gate: G2 Checklist / 人による判断
    weight: 30%
  - gate: G3 Structure Lint / 構造チェック
    weight: 25%
  - gate: G4 AI Evaluation / DeepEval
    weight: 20%
  - gate: PF Promptfoo / プロンプト評価
    weight: 15%
  - gate: G1 Ambiguity Check / 曖昧語チェック
    weight: 10%
  fatal_conditions:
  - condition: CI失敗
    gate: null
    criterion: パイプライン自体の異常終了
  - condition: トレーサビリティ欠落
    gate: G5
    criterion: ID参照の不整合、または孤立した定義の存在
  - condition: 構造重大違反
    gate: G3
    criterion: スキーマ逸脱など
  - condition: Faithfulness（整合性）壊滅
    gate: G4
    criterion: DeepEvalスコアが0.6未満
  - condition: 曖昧語の過剰検出
    gate: G1
    criterion: 検出数が10件超
  total_score:
    formula: Total Score = (G1 × 0.10) + (G3 × 0.25) + (G4 × 0.20) + (PF × 0.15) +
      (G2 × 0.30)
  risk_level_operation:
  - level: LOW Risk
    pass_score: 70点以上
    guidance: 軽微な構造違反や数件の曖昧語は減点対応とし、スピードを優先
  - level: HIGH Risk
    pass_score: 90点以上
    guidance: 厳格な統制を適用。微細な逸脱も修正対象
  g2_ci_integration:
    fail_conditions:
    - 'Fail（ビルド停止）条件：'
    - 項目を「Abort（中断）」した際、その理由（正当な根拠）がログに記載されていない
    warning_conditions:
    - 'Warning（警告）条件：'
    - Abort率が規定値を超え、『判断の回避』が常態化
    internal_weighting_note:
    - '内部重み付け：'
    - G2内でも、ドメインやフェーズに応じて項目ごとに内部重みを設定
