traceability:
  design_layers:
  - layer: Core（本ツール）
    capabilities:
    - ID抽出
    - 参照整合（derivedfrom/tracestoの存在確認）
    - カバレッジ算出
    - CoreレイヤーはID抽出と参照整合確認とカバレッジ算出を担当し結果をAllureへ出力する。
    - 未紐付け一覧
    - Allure出力
  - layer: Adapter（将来）
    capabilities:
    - ConTrack API連携（存在確認、リンク生成、関係解決）
    - Adapterレイヤーは将来拡張としてConTrack API連携を受け持つ。
    - ConTrack連携では存在確認とリンク生成と関係解決を段階的に実装する。
  value_statement: 既存のConTrackが存在しても品質ゲートとしての検査と可視化とブロック機能は本企画側の価値として維持する。
